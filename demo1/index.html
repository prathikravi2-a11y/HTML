<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎉</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SECTION 1 -->
<section id="tease">
  <h2>Hmm... what's today? 🤔</h2>
  <h1>Oh wait — it's YOUR day 🎉</h1>
  <button onclick="goToWish()">Open Surprise</button>
</section>

<!-- SECTION 2 -->
<section id="wish" class="hidden">
  <h1>Happy Birthday Pooja 🎂</h1>
  <p>Wishing you love, happiness and smiles 💖</p>
  <button onclick="goToCake()">Next →</button>
</section>

<!-- SECTION 3 -->
<section id="cake" class="hidden">
  <h2>Make a wish 🕯</h2>
  <button onclick="blowCandles()">Blow Candles</button>
  <p id="cakeMsg"></p>
  <button id="cakeNext" class="hidden" onclick="goToSurprise()">Continue →</button>
</section>

<!-- SECTION 4 -->
<section id="surprise" class="hidden">
  <h2>Pick a surprise 🎁</h2>

  <div class="boxes">
    <button onclick="openModal('photos')">📸 Memories</button>
    <button onclick="openModal('appre')">💛 Appreciation</button>
    <button onclick="openModal('letter')">💌 Letter</button>
    <button onclick="openModal('quiz')">🧠 Quiz</button>
    <button onclick="openModal('game')">🎮 Game</button>
  </div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <button onclick="closeModal()">X</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
